name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # angular's test script already runs tsc, so dist/ exists after the step above.
      # For a clean build without running tests again, we rebuild here explicitly.
      - name: Build Angular adapter
        run: npm run build --workspace=@danilo.riedel/img-fit-angular

      - name: Publish @danilo.riedel/img-fit
        run: npm publish --workspace=@danilo.riedel/img-fit --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @danilo.riedel/img-fit-react
        run: npm publish --workspace=@danilo.riedel/img-fit-react --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @danilo.riedel/img-fit-next
        run: npm publish --workspace=@danilo.riedel/img-fit-next --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @danilo.riedel/img-fit-vue
        run: npm publish --workspace=@danilo.riedel/img-fit-vue --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @danilo.riedel/img-fit-angular
        run: npm publish --workspace=@danilo.riedel/img-fit-angular --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
