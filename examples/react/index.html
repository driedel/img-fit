        "@img-fit/react": "/packages/react/src/index.js"
      }
    }
  </script>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { ImgFit } from '@img-fit/react';

    function App() {
      return React.createElement('div', { className: 'container' },
        React.createElement('h1', null, 'img-fit + React'),
        React.createElement('div', { className: 'card' },
          React.createElement(ImgFit, {
            src: 'https://img-fwd.driedel.dev/images/photo.jpg',
            alt: 'Coastal landscape'

            React.createElement('p', null, 'Resize the browser and check the Network tab.')
